<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCCEFC 組長全能助手 V7.4</title>
    <style>
        :root { --primary: #1a4a7c; --accent: #c5a059; --bg: #f4f7f9; --whatsapp: #25D366; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        h1 { color: var(--primary); text-align: center; font-size: 1.6rem; margin-bottom: 20px; }
        .input-title { font-weight: bold; color: var(--primary); margin-bottom: 8px; display: block; }
        textarea, .simple-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        textarea { background: #fffde7; }
        .simple-input { background: #e8f0fe; }
        button { padding: 15px; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 10px; }
        .btn-gen { background: var(--primary); font-size: 1.1rem; }
        .btn-gen:hover { background: #123456; }
        .btn-copy { background: var(--accent); display: none; }
        .btn-wa { background: var(--whatsapp); display: none; }
        .output-box { width: 100%; height: 280px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; overflow-y: auto; margin-top: 10px; display: none; }
        .section-title { font-weight: bold; color: var(--primary); margin-top: 25px; border-left: 5px solid var(--accent); padding-left: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align: center; color: var(--accent); font-weight: bold; margin-bottom: 5px;">⛪ Adult Pastoral Zone T1</div>
    <h1>組長全能助手 V7.4</h1>
    
    <span class="input-title">第一步：貼上教會網頁全文</span>
    <textarea id="rawInput" rows="5" placeholder="去網頁 Ctrl+A 全選並在此貼上..."></textarea>
    
    <span class="input-title">第二步：YouTube 連結 (選填)</span>
    <input type="text" id="manualYoutube" class="simple-input" placeholder="可手動貼上 YouTube 網址...">

    <button class="btn-gen" onclick="processData()">✨ 一鍵生成簡報指令及 WhatsApp 訊息</button>

    <div id="waTitle" class="section-title">📱 WhatsApp 群組訊息</div>
    <div id="waOutput" class="output-box"></div>
    <button id="copyWaBtn" class="btn-wa" onclick="copyText('waOutput', 'WhatsApp 訊息已複製')">📋 複製 WhatsApp 訊息</button>

    <div id="aiTitle" class="section-title">🤖 AI 簡報製作指令 (結構：封面 > 經文 > 問題 > 背景)</div>
    <div id="aiOutput" class="output-box"></div>
    <button id="copyAiBtn" class="btn-copy" onclick="copyToGemini()">📋 複製 AI 指令並前往 Gemini</button>
</div>

<script>
    function processData() {
        const input = document.getElementById('rawInput').value;
        const manualYT = document.getElementById('manualYoutube').value.trim();
        if (!input) { alert("請先貼上內容"); return; }

        // 提取資訊
        const title = extractInfo(input, /講題[：|:](.*?)\n/i) || "今日講道";
        const scripture = extractInfo(input, /經文[：|:](.*?)\n/i) || "請參閱網頁";
        
        const youtube = manualYT || extractYoutube(input) || "（請手動加入 YouTube 連結）";
        const questions = extractQuestions(input);
        const dates = calculateDates();

        // 1. WhatsApp 訊息 (維持原有格式)
        const waMsg = `Adult Pastoral Zone T1 cell group meeting
Date: ${dates.thisFri} (this Friday); our next meeting: ${dates.nextFri} (每個月的第二和第四個星期五)
Time: 5:45 pm - 7:30 pm
Room: 201, 213

${youtube}

講題：${title}
經文：${scripture}

小組分享問題：
${questions}`;

        // 2. AI 指令 (更新順序：移除大綱)
        const aiPrompt = `你現在是專業的聖經教師與 PowerPoint 設計師。請根據我提供的文字規劃一份製作 PPT 用的內容。

### ⚠️ 強制執行規則：
1. **簡報命名**：這份 PowerPoint 的名稱必須直接使用文字中提取的講題：【${title}】。
2. **分頁順序**：
   - Slide 1: 封面 (講題、講員、日期)
   - Slide 2: 今日經文 (顯示當天研讀的經文全文)
   - Slide 3 之後: 小組討論問題 (必須【一字不漏】從原文搬運，每題獨立佔一頁)
   - 最後部分: 研經背景與深度解析 (AI 補充內容)
3. **一字不漏**：小組分享問題部分不准做任何縮減、增加或修改。
4. **研經補充內容要求**：
   - 【經文概要】
   - 【經文解釋】
   - 【神學重點】
   - 【歷史文化背景】
   - 【引用】相關經文
   - 【屬靈應用】
   - 【默想與反思問題】(額外提出 2 題)
5. **圖片建議**：請為每一頁提供一個視覺描述。

以下是網頁內容：
${input}`;

        display('waOutput', waMsg, 'waTitle', 'copyWaBtn');
        display('aiOutput', aiPrompt, 'aiTitle', 'copyAiBtn');
    }

    function extractInfo(t, r) { const m = t.match(r); return m ? m[1].trim() : null; }
    
    function extractYoutube(t) {
        const r = /https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)[^\s\n\r\t<>"]+/i;
        const m = t.match(r); return m ? m[0] : null;
    }

    function extractQuestions(text) {
        const kw = ["小組進深分享問題", "小組分享問題", "討論問題", "小組問題"];
        let start = -1;
        for (let k of kw) { let i = text.indexOf(k); if (i !== -1 && (start===-1 || i<start)) start = i + k.length; }
        if (start === -1) return "（未能偵測到問題）";
        let res = text.substring(start).trim();
        if (res.startsWith("：") || res.startsWith(":")) res = res.substring(1).trim();
        const stop = ["Older Post", "SOUTH CALGARY", "Service Times", "Office:", "Careers", "📋"];
        let end = res.length;
        for (let s of stop) { let si = res.indexOf(s); if (si !== -1 && si < end) end = si; }
        return res.substring(0, end).trim();
    }

    function calculateDates() {
        const d = new Date();
        const f = new Date(d); f.setDate(d.getDate() + (5 - d.getDay() + 7) % 7);
        const n = new Date(f); n.setDate(f.getDate() + 14);
        const opt = { month: 'short', day: 'numeric', year: 'numeric' };
        return { thisFri: f.toLocaleDateString('en-US', opt), nextFri: n.toLocaleDateString('en-US', opt) };
    }

    function display(id, c, t, b) {
        document.getElementById(id).innerText = c;
        document.getElementById(id).style.display = "block";
        document.getElementById(t).style.display = "block";
        document.getElementById(b).style.display = "block";
    }

    function copyText(id, msg) {
        navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => alert(msg));
    }

    function copyToGemini() {
        navigator.clipboard.writeText(document.getElementById('aiOutput').innerText).then(() => {
            alert("指令已複製！現在為你打開 Gemini。");
            window.open("https://gemini.google.com/app", "_blank");
        });
    }
</script>

</body>
</html>
