<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCCEFC 小組簡報指令助手 (V5.0)</title>
    <style>
        :root { --primary: #1a4a7c; --accent: #c5a059; --bg: #f4f7f9; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h1 { color: var(--primary); text-align: center; font-size: 1.6rem; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        textarea { height: 150px; display: none; background: #fffcf0; border-color: var(--accent); }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        button:hover { background: #123456; }
        .copy-btn { background: var(--accent); display: none; }
        #status { text-align: center; color: #666; margin: 15px 0; font-weight: bold; }
        #promptOutput { width: 100%; height: 350px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fdfdfd; font-size: 0.95rem; display: none; white-space: pre-wrap; overflow-y: auto; }
        .manual-label { display: none; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align: center; color: var(--accent); font-weight: bold;">教會小組組長神器</div>
    <h1>一鍵生成 AI 簡報指令</h1>
    
    <input type="text" id="sermonUrl" placeholder="貼上講道網址..." value="https://www.sccefc.ca/cn/sermon-upload/4122026-">
    
    <div id="manualArea">
        <div class="manual-label" id="manualLabel">⚠️ 自動讀取失敗，請在此貼上網頁內容：</div>
        <textarea id="manualContent" placeholder="請到教會網頁全選文字 (Ctrl+A)，然後在此貼上 (Ctrl+V)"></textarea>
    </div>

    <button id="genBtn" onclick="process()">生成超級指令</button>
    <button id="copyBtn" class="copy-btn" onclick="copyAndGo()">📋 複製指令並前往 Gemini</button>
    
    <div id="status"></div>
    <div id="promptOutput"></div>
</div>

<script>
    async function process() {
        const url = document.getElementById('sermonUrl').value.trim();
        const manualContent = document.getElementById('manualContent');
        const status = document.getElementById('status');
        const output = document.getElementById('promptOutput');

        // 如果手動輸入框有內容，直接處理
        if (manualContent.style.display === "block" && manualContent.value.trim() !== "") {
            generateFinalPrompt(manualContent.value);
            return;
        }

        // 否則嘗試自動抓取
        try {
            status.innerText = "⏳ 正在嘗試自動讀取網頁 (請稍候)...";
            status.style.color = "#666";
            
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            if (!data.contents || data.contents.length < 500) {
                throw new Error("抓取內容不足");
            }
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            generateFinalPrompt(doc.body.innerText);

        } catch (e) {
            console.error(e);
            status.innerText = "❌ 自動讀取受阻（網站防火牆或代理斷線）";
            status.style.color = "red";
            // 顯示手動輸入框
            document.getElementById('manualLabel').style.display = "block";
            manualContent.style.display = "block";
            document.getElementById('genBtn').innerText = "立即根據貼上內容生成";
        }
    }

    function generateFinalPrompt(rawText) {
        const output = document.getElementById('promptOutput');
        const copyBtn = document.getElementById('copyBtn');
        const status = document.getElementById('status');

        const cleanText = rawText.replace(/\s+/g, ' ').substring(0, 6000);

        const megaPrompt = `你現在是專業聖經教師與 PPT 簡報設計師。請根據我提供的教會文字製作 PowerPoint 內容。

### 🚨 絕對規則：
1. **順序**：封面 -> 講道大綱 -> 今日經文 -> 小組進深分享問題 -> 經文深度研讀。
2. **小組問題**：必須從原文【一字不漏】搬運，不准修改、不准增加、不准簡化！
3. **今日經文**：請列出全文。
4. **研讀內容**：包含【經文概要】、【經文解釋】、【神學重點】、【歷史文化背景】、【相關引用】、【屬靈應用】、【默想反思】。
5. **配圖建議**：為每一頁投影片提供 1 個配圖描述。

--- 原始文字內容 ---
${cleanText}
------------------`;

        output.innerText = megaPrompt;
        output.style.display = "block";
        copyBtn.style.display = "block";
        status.innerText = "✅ 指令已生成！請複製。";
        status.style.color = "green";
    }

    function copyAndGo() {
        const text = document.getElementById('promptOutput').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("指令已複製！現在將為你開啟 Gemini。");
            window.open("https://gemini.google.com/app", "_blank");
        });
    }
</script>

</body>
</html>
