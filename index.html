<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCCEFC 小組簡報助手 (V4.0)</title>
    <style>
        :root { --primary: #1a4a7c; --accent: #c5a059; --bg: #f4f7f9; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        textarea { height: 150px; display: none; } /* 預設隱藏手動輸入框 */
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        button:hover { background: #123456; }
        .copy-btn { background: var(--accent); display: none; }
        #status { text-align: center; color: #d35400; margin-bottom: 10px; font-weight: bold; }
        #promptOutput { width: 100%; height: 300px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fdfdfd; font-size: 0.95rem; display: none; white-space: pre-wrap; overflow-y: auto; }
        .toggle-text { color: var(--primary); cursor: pointer; text-decoration: underline; font-size: 0.9rem; display: block; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align: center; color: var(--accent); font-weight: bold;">⛪ T1</div>
    <h1>小組簡報內容助手</h1>
    
    <div id="status"></div>

    <div id="autoMode">
        <input type="text" id="sermonUrl" placeholder="貼上講道網址..." value="https://www.sccefc.ca/cn/sermon-upload/4122026-">
        <button onclick="fetchAndGenerate()">1. 自動抓取網頁並生成指令</button>
    </div>

    <span class="toggle-text" onclick="toggleMode()">切換手動模式 (若自動抓取失敗，請按此)</span>

    <div id="manualMode" style="display:none;">
        <textarea id="manualText" placeholder="請直接在此貼上教會網頁的全選文字..."></textarea>
        <button onclick="generateFromText()">1. 根據手動文字生成指令</button>
    </div>
    
    <button id="copyBtn" class="copy-btn" onclick="copyToClipboard()">2. 複製指令並前往 Gemini</button>
    
    <div id="promptOutput"></div>
</div>

<script>
    let isManual = false;

    function toggleMode() {
        isManual = !isManual;
        document.getElementById('autoMode').style.display = isManual ? 'none' : 'block';
        document.getElementById('manualMode').style.display = isManual ? 'block' : 'none';
        document.getElementById('status').innerText = isManual ? "已切換至手動模式" : "";
    }

    async function fetchAndGenerate() {
        const url = document.getElementById('sermonUrl').value.trim();
        const status = document.getElementById('status');
        if (!url) { alert("請貼上網址"); return; }

        try {
            status.innerText = "🔍 正在嘗試抓取內容...";
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            if (!data.contents) throw new Error("讀取失敗");

            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            const fullText = doc.body.innerText;
            buildMegaPrompt(fullText);
        } catch (e) {
            status.innerText = "❌ 讀取失敗。請點擊下方「切換手動模式」，直接複製網頁文字貼上。";
        }
    }

    function generateFromText() {
        const text = document.getElementById('manualText').value;
        if (!text) { alert("請先貼上文字"); return; }
        buildMegaPrompt(text);
    }

    function buildMegaPrompt(content) {
        const megaPrompt = `你現在是一位專業的聖經教師與簡報設計師。請根據我提供的教會文字，製作 PowerPoint 大綱。

⚠️ 強制規則：
1. 順序：封面 -> 大綱 -> 今日經文 -> 小組分享問題 -> 經文研讀背景。
2. 小組分享問題：必須從原文中【一字不漏】搬運，不准修改任何字。
3. 每一頁請提供圖片建議 (Image Prompts)。

內容如下：
${content.substring(0, 5000)}`;

        const output = document.getElementById('promptOutput');
        output.innerText = megaPrompt;
        output.style.display = "block";
        document.getElementById('copyBtn').style.display = "block";
        document.getElementById('status').innerText = "✅ 指令已生成！";
        document.getElementById('status').style.color = "green";
    }

    function copyToClipboard() {
        const text = document.getElementById('promptOutput').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ 已複製！現在為你打開 Gemini。");
            window.open("https://gemini.google.com/app", "_blank");
        });
    }
</script>

</body>
</html>
