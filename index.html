<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCCEFC 組長全能助手 V8.1</title>
    <style>
        :root { --primary: #1a4a7c; --accent: #c5a059; --bg: #f4f7f9; --whatsapp: #25D366; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        h1 { color: var(--primary); text-align: center; font-size: 1.6rem; margin-bottom: 20px; }
        .input-title { font-weight: bold; color: var(--primary); margin-bottom: 8px; display: block; }
        textarea, .simple-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        textarea { background: #fffde7; }
        .simple-input { background: #e8f0fe; }
        button { padding: 15px; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 10px; }
        .btn-gen { background: var(--primary); font-size: 1.1rem; }
        .btn-gen:hover { background: #123456; }
        .btn-copy { background: var(--accent); display: none; }
        .btn-wa { background: var(--whatsapp); display: none; }
        .output-box { width: 100%; height: 300px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; overflow-y: auto; margin-top: 10px; display: none; }
        .section-title { font-weight: bold; color: var(--primary); margin-top: 25px; border-left: 5px solid var(--accent); padding-left: 10px; display: none; }
        .hint { font-size: 0.85rem; color: #d35400; margin-bottom: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align: center; color: var(--accent); font-weight: bold; margin-bottom: 5px;">⛪ 南卡城華人播道會 (SCCEFC)</div>
    <h1>組長全能助手 V8.1</h1>
    <p class="hint"> V8.1 更新：強力排版校對 + 糾正地理錯誤 </p>
    
    <span class="input-title">第一步：貼上教會網頁全文</span>
    <textarea id="rawInput" rows="5" placeholder="去網頁 Ctrl+A 全選並在此貼上..."></textarea>
    
    <span class="input-title">第二步：YouTube 連結 (選填)</span>
    <input type="text" id="manualYoutube" class="simple-input" placeholder="可手動貼上影片網址...">

    <button class="btn-gen" onclick="processData()">✨ 一鍵生成專業純淨指令及 WhatsApp</button>

    <div id="waTitle" class="section-title">📱 WhatsApp 群組訊息</div>
    <div id="waOutput" class="output-box"></div>
    <button id="copyWaBtn" class="btn-wa" onclick="copyContent('waOutput', '✅ WhatsApp 訊息已複製')">📋 複製 WhatsApp 訊息</button>

    <div id="aiTitle" class="section-title">🤖 AI 簡報製作指令 (排版加強版)</div>
    <div id="aiOutput" class="output-box"></div>
    <button id="copyAiBtn" class="btn-copy" onclick="copyToGemini()">📋 複製 AI 指令並前往 Gemini</button>
</div>

<script>
    function processData() {
        const input = document.getElementById('rawInput').value;
        const manualYT = document.getElementById('manualYoutube').value.trim();
        if (!input) { alert("請先貼上內容！"); return; }

        const title = extractInfo(input, /講題[：|:](.*?)\n/i) || extractInfo(input, /Sermon Title[：|:](.*?)\n/i) || "今日講道";
        const scriptureRef = extractInfo(input, /經文[：|:](.*?)\n/i) || extractInfo(input, /Scripture[：|:](.*?)\n/i) || "請參閱網頁";
        const youtube = manualYT || extractYoutube(input) || "（請手動加入連結）";
        const questions = extractQuestions(input);
        const dates = calculateMeetingDates();

        const waMsg = `Adult Pastoral Zone T1 cell group meeting
Date: ${dates.thisMeeting} (this Friday); our next meeting: ${dates.nextMeeting} (每個月的第二和第四個星期五)
Time: 5:45 pm - 7:30 pm
Room: 201, 213

${youtube}

講題：${title}
經文：${scriptureRef}

小組分享問題：
${questions}`;

        const aiPrompt = `你現在是專業的聖經教師與專業 PPT 簡報排版設計師。請根據我提供的內容規劃 PPT。

### ⛔ 內容禁令 (必須嚴格執行)：
1. **禁止幻覺**：SCCEFC 是「南卡城華人播道會」(South Calgary Chinese EFC)，位於加拿大卡加利。🚫 **絕對禁止**寫成「南加州」或任何宣道會。
2. **禁止雜訊**：除題目外，禁止在投影片添加任何額外的屬靈口號、勵志語句或不知名的裝飾文字。
3. **禁止亂改問題**：小組討論問題必須【完全一字不漏】搬運，不准加 Bullet points 或解釋。

### 🎨 排版與設計要求：
- **視覺風格**：清新、簡潔、對稱。背景限用「淺米白」或「極淡藍」。
- **排版命令**：所有標題與內文必須「水平與垂直居中」，文字長度需適中，避免尷尬斷行。
- **配圖要求**：為每一頁提供一個高清、具歷史深度或靈修默想感的圖片描述，圖片需與文字有清晰區隔，不可重疊影響閱讀。

### 📅 簡報結構：
1. **Slide 1 封面**：標題【${title}】、經文【${scriptureRef}】、堂會【南卡城華人播道會】。
2. **Slide 2 今日經文**：必須列出 (${scriptureRef}) 的【聖經原文全文】，不准摘要。
3. **Slide 3 之後 (討論問題)**：每一題獨立一頁，頁面只能有原問題文字，字體要大且置中。
4. **研經背景答案**：最後部分請提供【經文概要】、【經文解釋】、【神學重點】、【歷史文化背景】、【引用】、【屬靈應用】、【默想與反思問題】。

以下是網頁內容：
${input}`;

        showResult('waOutput', waMsg, 'waTitle', 'copyWaBtn');
        showResult('aiOutput', aiPrompt, 'aiTitle', 'copyAiBtn');
        document.getElementById('waTitle').scrollIntoView({ behavior: 'smooth' });
    }

    function extractInfo(text, regex) { const m = text.match(regex); return m ? m[1].trim() : null; }
    function extractYoutube(text) { const r = /https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)[^\s\n\r\t<>"]+/i; const m = text.match(r); return m ? m[0] : null; }

    function extractQuestions(text) {
        const kw = ["討論問題", "小組分享問題", "小組問題", "討論題目", "小組進深分享問題"];
        let startIdx = -1;
        let matchedKw = "";
        for (let k of kw) {
            let idx = text.indexOf(k);
            if (idx !== -1 && (startIdx === -1 || idx < startIdx)) { startIdx = idx; matchedKw = k; }
        }
        if (startIdx === -1) { const m = text.match(/\n\s*1\.\s/); if(m) startIdx = m.index; }
        if (startIdx === -1) return "（未能偵測問題）";
        
        let res = text.substring(startIdx + matchedKw.length).trim();
        if (res.startsWith("：") || res.startsWith(":")) res = res.substring(1).trim();

        const stop = ["Newer Post", "Older Post", "SOUTH CALGARY", "340 39 AVENUE", "OFFICE@SCCEFC.CA", "Google Calendar", "Service Times", "職位空缺", "📋"];
        let endIdx = res.length;
        for (let s of stop) { let si = res.indexOf(s); if (si !== -1 && si < endIdx) endIdx = si; }
        return res.substring(0, endIdx).trim();
    }

    function calculateMeetingDates() {
        const d = new Date();
        const f = new Date(d); f.setDate(d.getDate() + (5 - d.getDay() + 7) % 7);
        const opt = { month: 'short', day: 'numeric', year: 'numeric' };
        const n = new Date(f); n.setDate(f.getDate() + 14);
        return { thisMeeting: f.toLocaleDateString('en-US', opt), nextMeeting: n.toLocaleDateString('en-US', opt) };
    }

    function showResult(id, content, titleId, btnId) {
        document.getElementById(id).innerText = content;
        document.getElementById(id).style.display = "block";
        document.getElementById(titleId).style.display = "block";
        document.getElementById(btnId).style.display = "block";
    }

    function copyContent(id, msg) {
        navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => alert(msg));
    }

    function copyToGemini() {
        const text = document.getElementById('aiOutput').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ 指令已複製！\n現在將打開 AI 視窗。");
            window.open("https://gemini.google.com/app", "_blank");
        });
    }
</script>

</body>
</html>
