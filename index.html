<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCCEFC 組長助手 V9.1 (程序表強化版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --primary: #1a4a7c; --accent: #c5a059; --bg: #f4f7f9; --whatsapp: #25D366; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        h1 { color: var(--primary); text-align: center; font-size: 1.6rem; margin-bottom: 20px; }
        .input-title { font-weight: bold; color: var(--primary); margin-bottom: 8px; display: block; }
        textarea, .simple-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        textarea { background: #fffde7; }
        .upload-section { border: 2px dashed #1a4a7c; padding: 25px; text-align: center; border-radius: 8px; margin-bottom: 20px; background: #eef4f9; cursor: pointer; transition: 0.3s; }
        .upload-section:hover { background: #e1ebf5; border-color: var(--accent); }
        button { padding: 15px; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 10px; }
        .btn-gen { background: var(--primary); font-size: 1.1rem; }
        .btn-gen:hover { background: #123456; }
        .btn-wa { background: var(--whatsapp); display: none; }
        .btn-copy { background: var(--accent); display: none; }
        .output-box { width: 100%; height: 300px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; overflow-y: auto; margin-top: 10px; display: none; }
        .section-title { font-weight: bold; color: var(--primary); margin-top: 25px; border-left: 5px solid var(--accent); padding-left: 10px; display: none; }
        .hint { font-size: 0.85rem; color: #d35400; font-weight: bold; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align: center; color: var(--accent); font-weight: bold; margin-bottom: 5px;">⛪ 南卡城華人播道會 (SCCEFC)</div>
    <h1>組長全能助手 V9.1</h1>
    <p class="hint">💡 支援程序表 PDF 自動篩選講題、經文及 1-5 題討論問題</p>

    <div class="upload-section" onclick="document.getElementById('pdfFile').click()">
        <p id="uploadText">📄 點擊上傳本週程序表 PDF</p>
        <input type="file" id="pdfFile" accept=".pdf" style="display:none" onchange="handlePdfUpload(event)">
    </div>

    <span class="input-title">第一步：確認篩選內容 (如有錯誤可手動修正)</span>
    <textarea id="rawInput" rows="6" placeholder="PDF 內容將在此自動顯示..."></textarea>
    
    <span class="input-title">第二步：YouTube 連結 (選填)</span>
    <input type="text" id="manualYoutube" class="simple-input" placeholder="貼上本週 YouTube 影片網址...">

    <button class="btn-gen" onclick="processData()">🚀 生成 WhatsApp 與 AI 簡報指令</button>

    <div id="waTitle" class="section-title">📱 WhatsApp 群組訊息</div>
    <div id="waOutput" class="output-box"></div>
    <button id="copyWaBtn" class="btn-wa" onclick="copyContent('waOutput', '✅ WhatsApp 訊息已複製')">📋 複製 WhatsApp 訊息</button>

    <div id="aiTitle" class="section-title">🤖 AI 簡報製作指令</div>
    <div id="aiOutput" class="output-box"></div>
    <button id="copyAiBtn" class="btn-copy" onclick="copyToGemini()">📋 複製 AI 指令並前往 Gemini</button>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    async function handlePdfUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        document.getElementById('uploadText').innerText = "⏳ 正在精確篩選 PDF 內容...";
        
        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            let fullText = "";

            // 掃描所有頁面，但我們知道重點通常在第二頁
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ") + "\n";
            }

            // --- 智能篩選邏輯 ---
            const title = extractInfo(fullText, /(?:講題|主題|証道主題)[：|: ](.*?)(?:\n|經文|旨意)/i) || "（請手動填入講題）";
            const scripture = extractInfo(fullText, /經文[：|: ](.*?)(?:\n|講題|主題|小組)/i) || "（請手動填入經文）";
            const questions = extractNumberedQuestions(fullText);

            // 格式化後填入輸入框
            document.getElementById('rawInput').value = `講題：${title}\n經文：${scripture}\n\n小組進深分享問題：\n${questions}`;
            document.getElementById('uploadText').innerText = "✅ " + file.name + " 篩選完成！";
            
            processData();
        } catch (e) {
            alert("PDF 處理失敗，請手動貼上文字。");
            document.getElementById('uploadText').innerText = "❌ 讀取失敗";
        }
    }

    function extractNumberedQuestions(text) {
        // 尋找「小組」相關關鍵字開始後的內容
        const kw = ["小組進深分享問題", "討論問題", "分享題目", "小組分享"];
        let startIdx = -1;
        for (let k of kw) {
            let i = text.indexOf(k);
            if (i !== -1 && (startIdx === -1 || i < startIdx)) startIdx = i;
        }

        if (startIdx === -1) return "1.\n2.\n3.\n4.\n5.";

        let content = text.substring(startIdx);
        
        // 使用正則表達式尋找 1. 2. 3. 4. 5.
        // 匹配從 1. 開始到 5. 結束的內容
        const match = content.match(/1\..*?2\..*?3\..*?4\..*?5\..*?(?=\n\n|\n[^\d\s.]{3,}|Older|Newer|報告|主日)/s);
        
        if (match) {
            // 稍微格式化，確保每一題換行
            return match[0].replace(/(\d\.)/g, "\n$1").trim();
        }
        return "（未偵測到完整的 1-5 題格式，請手動修正）";
    }

    function processData() {
        const input = document.getElementById('rawInput').value;
        const manualYT = document.getElementById('manualYoutube').value.trim();
        if (!input) return;

        const title = extractInfo(input, /講題[：|:](.*?)\n/i) || "今日講道";
        const scripture = extractInfo(input, /經文[：|:](.*?)\n/i) || "請參閱程序表";
        const youtube = manualYT || extractYoutube(input) || "（請手動加入連結）";
        const questions = extractQuestionsFromBox(input);
        const dates = calculateMeetingDates();

        const waMsg = `Adult Pastoral Zone T1 cell group meeting\nDate: ${dates.thisMeeting} (this Friday); our next meeting: ${dates.nextMeeting} (每個月的第二和第四個星期五)\nTime: 5:45 pm - 7:30 pm\nRoom: 201, 213\n\n${youtube}\n\n講題：${title}\n經文：${scripture}\n\n小組分享問題：\n${questions}`;

        const aiPrompt = `你現在是專業的聖經教師與 PPT 設計師。請規劃 PPT 內容。

### 🎨 視覺：清新、明亮、溫馨。淺色背景搭配深色字。🚫嚴禁全黑背景。

### ⚠️ 規則：
1. 簡報命名：【${title}】。堂會：卡城華人播道會 (SCCEFC)。🚫禁止出現南加州。
2. 順序：封面 -> 經文全文 -> 小組討論問題 -> 專業研經背景。
3. 經文：必須列出 (${scripture}) 的聖經原文全文，嚴禁摘要。
4. 問題：必須【完全一字不漏】搬運，不准加額外解釋，每題佔一頁。
5. 研經背景：請提供經文概要、解釋、神學重點、歷史背景、引用、屬靈應用、反思問題（2-3題）。

內容如下：
${input}`;

        document.getElementById('waOutput').innerText = waMsg;
        document.getElementById('aiOutput').innerText = aiPrompt;
        ['waOutput', 'aiOutput', 'waTitle', 'aiTitle', 'copyWaBtn', 'copyAiBtn'].forEach(id => document.getElementById(id).style.display = 'block');
    }

    // 輔助函數
    function extractInfo(text, regex) { const m = text.match(regex); return m ? m[1].trim() : null; }
    function extractYoutube(text) { const r = /https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)[^\s\n\r\t<>"]+/i; const m = text.match(r); return m ? m[0] : null; }
    
    function extractQuestionsFromBox(text) {
        const idx = text.indexOf("小組進深分享問題：");
        return idx !== -1 ? text.substring(idx + 9).trim() : "（請檢查內容）";
    }

    function calculateMeetingDates() {
        const d = new Date();
        const f = new Date(d); f.setDate(d.getDate() + (5 - d.getDay() + 7) % 7);
        const n = new Date(f); n.setDate(f.getDate() + 14);
        const opt = { month: 'short', day: 'numeric', year: 'numeric' };
        return { thisMeeting: f.toLocaleDateString('en-US', opt), nextMeeting: n.toLocaleDateString('en-US', opt) };
    }

    function copyContent(id, msg) {
        navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => alert(msg));
    }

    function copyToGemini() {
        navigator.clipboard.writeText(document.getElementById('aiOutput').innerText).then(() => {
            alert("指令已複製！現在將打開 AI。");
            window.open("https://gemini.google.com/app", "_blank");
        });
    }
</script>
</body>
</html>
